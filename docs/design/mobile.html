<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Translation Lab - Mobile Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0b1220",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex justify-center">
<!-- Mobile-optimized Container (Simulating Mobile on Desktop) -->
<div class="relative flex h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark overflow-hidden border-x border-slate-200 dark:border-slate-800 shadow-2xl">
<!-- Header Section -->
<header class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800 shrink-0">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-2xl" data-icon="translate">translate</span>
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight">AI Translation Lab</h1>
</div>
<div class="flex items-center gap-3">
<button class="p-2 rounded-lg bg-slate-200/50 dark:bg-slate-800 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-xl">settings</span>
</button>
<div class="size-8 rounded-full bg-primary/20 flex items-center justify-center overflow-hidden border border-primary/30">
<img class="w-full h-full object-cover" data-alt="User profile avatar placeholder" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJpS6948pAWlvx-hi4BzVSjZwle50ve3NFCboiRfBHrga9yDdeiiY23NgIn4Hcef71Rk6LLo9NqcPeX1BOwy-1gnaFYqp5nW6E74b8h-j5mV3x-roKhfzts1kb-gBhxK_yu5pYE4vN48ARELtlHBPgYUpg5HZ0RAlUlJu9pUC8rfiJDqgr39FNuT6lJ_Snwueq2Lg9VAGoIT26aVaURmkvEEyBWXQ3qZDEX26K7GoKC-dzHt0SmI2y_IrLeG_RrS7MfCTdeM_4XNM"/>
</div>
</div>
</header>
<!-- Language Selector Row -->
<div class="flex items-center justify-between px-6 py-3 bg-slate-100 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-800">
<button class="flex-1 text-center py-2 font-bold text-primary border-b-2 border-primary">VI</button>
<div class="px-4 text-slate-400 dark:text-slate-600">
<span class="material-symbols-outlined text-xl leading-none">swap_horiz</span>
</div>
<button class="flex-1 text-center py-2 font-bold text-slate-500 dark:text-slate-400">EN</button>
</div>
<!-- Scrollable Content Area -->
<main class="flex-1 flex flex-col p-4 gap-4 overflow-y-auto">
<!-- Source Input (approx 40% of height) -->
<div class="flex flex-col flex-[0.4] min-h-[250px] relative">
<div class="flex justify-between items-center mb-2 px-1">
<span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-500">Source Text</span>
<span class="text-xs text-slate-400 dark:text-slate-600">0 / 2000</span>
</div>
<textarea class="w-full h-full p-4 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent resize-none text-base leading-relaxed" placeholder="Enter text to translate..."></textarea>
</div>
<!-- Controls and Action Section -->
<div class="space-y-4">
<!-- Dropdowns Row -->
<div class="flex gap-3">
<button class="flex-1 flex items-center justify-between px-3 py-2 bg-slate-200/50 dark:bg-slate-800 rounded-lg border border-slate-300 dark:border-slate-700">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">psychology</span>
<span class="text-xs font-semibold">Tone: Professional</span>
</div>
<span class="material-symbols-outlined text-sm">expand_more</span>
</button>
<button class="flex-1 flex items-center justify-between px-3 py-2 bg-slate-200/50 dark:bg-slate-800 rounded-lg border border-slate-300 dark:border-slate-700">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">terminal</span>
<span class="text-xs font-semibold">Mode: Technical</span>
</div>
<span class="material-symbols-outlined text-sm">expand_more</span>
</button>
</div>
<!-- Primary Translate Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined">auto_fix_high</span>
                    Translate Now
                </button>
</div>
<!-- Output Area -->
<div class="flex flex-col flex-1 min-h-[200px] relative mb-4">
<div class="flex justify-between items-center mb-2 px-1">
<span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-500">Translation</span>
</div>
<div class="w-full h-full p-4 rounded-xl bg-primary/5 dark:bg-slate-900/80 border border-primary/20 dark:border-slate-800 text-slate-900 dark:text-slate-100 text-base leading-relaxed relative group">
<p class="text-slate-400 dark:text-slate-500 italic">Translated output will appear here...</p>
<!-- Floating Action Button for Copy -->
<button class="absolute bottom-4 right-4 size-12 rounded-full bg-primary text-white shadow-xl flex items-center justify-center hover:scale-110 active:scale-95 transition-transform">
<span class="material-symbols-outlined">content_copy</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Utility) -->
<nav class="flex justify-around items-center px-6 py-3 border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">translate</span>
<span class="text-[10px] font-bold">Translate</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-bold">History</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">star</span>
<span class="text-[10px] font-bold">Saved</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">api</span>
<span class="text-[10px] font-bold">API</span>
</button>
</nav>
</div>
</body></html>
